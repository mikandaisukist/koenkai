function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }

function formatDate(d) {
  if (!d) return "";
  var dt = new Date(d);
  return dt.getFullYear() + "/" + String(dt.getMonth()+1).padStart(2,"0") + "/" + String(dt.getDate()).padStart(2,"0");
}

function formatDateTime(d) {
  if (!d) return "";
  return formatDate(d) + " " + String(new Date(d).getHours()).padStart(2,"0") + ":" + String(new Date(d).getMinutes()).padStart(2,"0");
}

function todayStr() {

}

function escapeCSV(val) {
  var s = String(val != null ? val : "");
  if (s.indexOf(",") >= 0 || s.indexOf('"') >= 0 || s.indexOf("\n") >= 0) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function detectDelimiter(headerLine) {
  // Count potential delimiters in the header line (outside quotes)
  var counts = { ",": 0, "\t": 0, ";": 0 };
  var inQuotes = false;
  for (var i = 0; i < headerLine.length; i++) {
    var ch = headerLine[i];
    if (ch === '"') { inQuotes = !inQuotes; continue; }
    if (!inQuotes && counts.hasOwnProperty(ch)) { counts[ch]++; }
  }
  // Return the delimiter with highest count (prefer comma if tied)
  if (counts["\t"] > counts[","] && counts["\t"] > counts[";"]) return "\t";
  if (counts[";"] > counts[","] && counts[";"] > counts["\t"]) return ";";
  return ",";
}

function parseLine(line, delimiter) {
  var result = [], current = "", inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (inQuotes) {
      if (ch === '"') { if (i+1 < line.length && line[i+1] === '"') { current += '"'; i++; } else { inQuotes = false; } }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; } else if (ch === delimiter) { result.push(current); current = ""; } else { current += ch; }
    }
  }
  result.push(current);
  return result;
}

// Backward compat wrapper (used by other parts if any)
function parseCSVLine(line) { return parseLine(line, detectDelimiter(line)); }

function escapeHTML(str) { var d = document.createElement("div"); d.textContent = str; return d.innerHTML; }

// ---- OAuth + Google Sheets API data layer ----
var _accessToken = null;

function getAuthHeaders() {
  if (!_accessToken) throw new Error("未ログイン");
  return { "Authorization": "Bearer " + _accessToken, "Content-Type": "application/json" };
}

async function sheetsGet(range) {
  var url = SHEETS_API_BASE + "/values/" + encodeURIComponent(range);
  var res = await fetch(url, { headers: getAuthHeaders() });
  if (!res.ok) { var t = await res.text(); throw new Error("GET " + res.status + ": " + t); }
  return await res.json();
}

async function sheetsClear(range) {
  var url = SHEETS_API_BASE + "/values/" + encodeURIComponent(range) + ":clear";
  var res = await fetch(url, { method: "POST", headers: getAuthHeaders() });
  if (!res.ok) { var t = await res.text(); throw new Error("CLEAR " + res.status + ": " + t); }
}

async function sheetsUpdate(range, values) {
  var url = SHEETS_API_BASE + "/values/" + encodeURIComponent(range) + "?valueInputOption=RAW";
  var res = await fetch(url, { method: "PUT", headers: getAuthHeaders(), body: JSON.stringify({ range: range, majorDimension: "ROWS", values: values }) });
  if (!res.ok) { var t = await res.text(); throw new Error("UPDATE " + res.status + ": " + t); }
}

async function ensureContactsSheet() {
  // Check if contacts sheet exists, create if not
  try {
    var url = SHEETS_API_BASE + "?fields=sheets.properties.title";
    var res = await fetch(url, { headers: getAuthHeaders() });
    var data = await res.json();
    var exists = (data.sheets || []).some(function(s) { return s.properties.title === SHEET_CONTACTS; });
    if (!exists) {
      await fetch(SHEETS_API_BASE + ":batchUpdate", {
        method: "POST", headers: getAuthHeaders(),
        body: JSON.stringify({ requests: [{ addSheet: { properties: { title: SHEET_CONTACTS } } }] }),
      });
      // Write header row
      await sheetsUpdate(SHEET_CONTACTS + "!A1:G1", [CONTACT_COLS]);
    }
  } catch(e) { console.error("ensureContactsSheet error:", e); }
}

async function loadFromSheets() {
  await ensureContactsSheet();
  // Load members
  var membersData = [];
  try {
    var mRes = await sheetsGet(SHEET_MEMBERS + "!A2:N10000");
    membersData = (mRes.values || []).map(function(row) {
      var m = { contacts: [], createdAt: "", updatedAt: "" };
      SHEET_COLS.forEach(function(col, i) { m[col] = (row[i] || "").toString(); });
      return m;
    }).filter(function(m) { return m.id && m.name; });
  } catch(e) { console.error("Load members error:", e); throw e; }

  // Load contacts
  try {
    var cRes = await sheetsGet(SHEET_CONTACTS + "!A2:G50000");
    var contactRows = cRes.values || [];
    var contactMap = {};
    contactRows.forEach(function(row) {
      var c = {};
      CONTACT_COLS.forEach(function(col, i) { c[col] = (row[i] || "").toString(); });
      c.id = c.contactId;
      if (!c.memberId) return;
      if (!contactMap[c.memberId]) contactMap[c.memberId] = [];
      contactMap[c.memberId].push(c);
    });
    // Attach contacts to members, sorted by date desc
    membersData.forEach(function(m) {
      m.contacts = (contactMap[m.id] || []).sort(function(a, b) { return (b.date || "").localeCompare(a.date || ""); });
    });
  } catch(e) { console.error("Load contacts error:", e); }

  return membersData;
}

async function saveToSheets(members) {
  // Save members
  var mValues = members.map(function(m) {
    return SHEET_COLS.map(function(col) { return m[col] || ""; });
  });
  await sheetsClear(SHEET_MEMBERS + "!A2:N10000");
  if (mValues.length > 0) {
    await sheetsUpdate(SHEET_MEMBERS + "!A2:N" + (mValues.length + 1), mValues);
  }

  // Save all contacts
  var cValues = [];
  members.forEach(function(m) {
    (m.contacts || []).forEach(function(c) {
      cValues.push([c.id || c.contactId || "", m.id, c.date || "", c.type || "", c.staff || "", c.content || "", c.createdAt || ""]);
    });
  });
  await sheetsClear(SHEET_CONTACTS + "!A2:G50000");
  if (cValues.length > 0) {
    await sheetsUpdate(SHEET_CONTACTS + "!A2:G" + (cValues.length + 1), cValues);
  }
}

// Auto-detect overdue status
function computeVisitStatus(member) {
  var vs = member.visitStatus || "unvisited";
  if (vs === "unvisited" || vs === "met" || vs === "delivered" || vs === "absent") {
    var lastVisit = (member.contacts || []).find(function(c) { return c.type === "訪問"; });
    if (lastVisit) {
      var daysSince = (Date.now() - new Date(lastVisit.date).getTime()) / (1000*60*60*24);
      if (daysSince > 365) return "overdue";
    }
  }
  return vs;
}

// Build InfoWindow HTML
function buildInfoHTML(m) {
  var vs = VISIT_STATUS[computeVisitStatus(m)] || VISIT_STATUS.unvisited;
  var rk = RANKS[m.rank] || RANKS.C;
  var lastContact = (m.contacts || [])[0];
  var html = '<div class="iw-container">';
  html += '<div class="iw-name">' + escapeHTML(m.name) + ' <span style="font-size:12px;color:#718096;">' + escapeHTML(m.furigana || "") + '</span></div>';
  html += '<div class="iw-row"><span class="iw-badge" style="background:' + rk.bg + ';color:' + rk.color + ';">' + rk.label + '</span> ';
  html += '<span class="iw-badge" style="background:' + vs.color + '22;color:' + vs.color + ';border:1px solid ' + vs.color + '44;">' + vs.icon + ' ' + vs.label + '</span></div>';
  if (m.address) html += '<div class="iw-row"><span class="iw-label">住所</span><span class="iw-val">' + escapeHTML((m.postalCode ? "〒"+m.postalCode+" " : "") + m.address) + '</span></div>';
  if (m.district) html += '<div class="iw-row"><span class="iw-label">地区</span><span class="iw-val">' + escapeHTML(m.district) + '</span></div>';
  if (m.phone) html += '<div class="iw-row"><span class="iw-label">電話</span><span class="iw-val">' + escapeHTML(m.phone) + '</span></div>';
  if (m.email) html += '<div class="iw-row"><span class="iw-label">メール</span><span class="iw-val">' + escapeHTML(m.email) + '</span></div>';
  if (m.introducer) html += '<div class="iw-row"><span class="iw-label">紹介者</span><span class="iw-val">' + escapeHTML(m.introducer) + '</span></div>';
  if (lastContact) html += '<div class="iw-row"><span class="iw-label">最終接触</span><span class="iw-val">' + escapeHTML(lastContact.type + " " + formatDate(lastContact.date) + (lastContact.content ? " - " + lastContact.content : "")) + '</span></div>';
  if (m.memo) html += '<div class="iw-memo">' + escapeHTML(m.memo) + '</div>';
  html += '</div>';
  return html;
}

// Create dual-ring SVG marker
function createMarkerSVG(rankColor, visitColor, visitIcon) {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">';
  svg += '<circle cx="16" cy="16" r="14" fill="' + rankColor + '" stroke="#fff" stroke-width="2"/>';
  svg += '<circle cx="16" cy="16" r="8" fill="' + visitColor + '" stroke="#fff" stroke-width="1.5"/>';
  svg += '<text x="16" y="16" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="bold">' + visitIcon + '</text>';
  svg += '</svg>';
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}

// Google Maps Component
function MapView({ members, onSelectMember, mapMode, filterMapRank, filterMapVisit }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef([]);
  const infoWindowRef = useRef(null);
  const [mapLoaded, setMapLoaded] = useState(false);
  const [mapError, setMapError] = useState("");

  useEffect(function() {
    if (window.google && window.google.maps) { setMapLoaded(true); return; }
    var existing = document.getElementById("gmaps-script");
    if (existing) return;
    var script = document.createElement("script");
    script.id = "gmaps-script";
    script.src = "https://maps.googleapis.com/maps/api/js?key=" + GOOGLE_MAPS_API_KEY + "&language=ja&region=JP";
    script.async = true;
    script.onload = function() { setMapLoaded(true); };
    script.onerror = function() { setMapError("Google Maps の読み込みに失敗しました。"); };
    document.head.appendChild(script);
  }, []);

  useEffect(function() {
    if (!mapLoaded || !mapRef.current) return;
    if (!mapInstanceRef.current) {
      mapInstanceRef.current = new window.google.maps.Map(mapRef.current, {
        center: { lat: 36.3142, lng: 139.5787 }, zoom: 13,
        mapTypeControl: true, streetViewControl: false,
      });
      infoWindowRef.current = new window.google.maps.InfoWindow({ disableAutoPan: false, maxWidth: 340 });
    }
    // Clear old markers
    markersRef.current.forEach(function(m) { m.setMap(null); });
    markersRef.current = [];

    var bounds = new window.google.maps.LatLngBounds();
    var hasPoints = false;
    var iw = infoWindowRef.current;
    var isTouch = !window.matchMedia("(hover: hover)").matches;

    members.forEach(function(m) {
      if (!m.lat || !m.lng) return;
      var lat = parseFloat(m.lat), lng = parseFloat(m.lng);
      if (isNaN(lat) || isNaN(lng)) return;

      // Apply map filters
      if (filterMapRank !== "all" && m.rank !== filterMapRank) return;
      var vs = computeVisitStatus(m);
      if (filterMapVisit !== "all" && vs !== filterMapVisit) return;

      hasPoints = true;
      var pos = { lat: lat, lng: lng };
      bounds.extend(pos);

      var rankColor = (RANKS[m.rank] || RANKS.C).color;
      var visitInfo = VISIT_STATUS[vs] || VISIT_STATUS.unvisited;

      var marker = new window.google.maps.Marker({
        position: pos,
        map: mapInstanceRef.current,
        title: m.name,
        icon: {
          url: createMarkerSVG(rankColor, visitInfo.color, visitInfo.icon),
          scaledSize: new window.google.maps.Size(32, 32),
          anchor: new window.google.maps.Point(16, 16),
        },
      });

      if (isTouch) {
        // Mobile: tap to show InfoWindow
        marker.addListener("click", function() {
          iw.setContent(buildInfoHTML(m));
          iw.open(mapInstanceRef.current, marker);
        });
      } else {
        // Desktop: hover for InfoWindow, click for detail
        marker.addListener("mouseover", function() {
          iw.setContent(buildInfoHTML(m));
          iw.open(mapInstanceRef.current, marker);
        });
        marker.addListener("mouseout", function() {
          iw.close();
        });
        marker.addListener("click", function() {
          onSelectMember(m.id);
        });
      }

      markersRef.current.push(marker);
    });

    if (hasPoints) {
      mapInstanceRef.current.fitBounds(bounds);
      if (markersRef.current.length === 1) mapInstanceRef.current.setZoom(15);
    }
  }, [mapLoaded, members, onSelectMember, mapMode, filterMapRank, filterMapVisit]);

  if (mapError) return <div style={{padding:20,color:"#dc2626"}}>{mapError}</div>;
  return <div ref={mapRef} style={{width:"100%",height:"100%",minHeight:400,borderRadius:8}} />;
}

  function processCSVText(text) {
    // Normalize line endings
    text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    // Remove BOM
    if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1);

    var lines = text.split("\n").filter(function(l) { return l.trim(); });
    if (lines.length < 2) { showToast("CSVが空です（データ行がありません）"); return; }

    // Detect delimiter from header row
    var delimiter = detectDelimiter(lines[0]);

    // Parse header row and build column mapping
    var headerCols = parseLine(lines[0], delimiter);
    var colMap = {}; // index -> field name
    var hasHeaderMatch = false;

    for (var h = 0; h < headerCols.length; h++) {
      var raw = headerCols[h].trim().toLowerCase().replace(/[\s　]+/g, "");
      // Try exact match first, then partial match
      var matched = HEADER_MAP[raw] || HEADER_MAP[headerCols[h].trim()];
      if (!matched) {
        // Try partial matching
        Object.keys(HEADER_MAP).forEach(function(key) {
          if (!matched && raw.indexOf(key.toLowerCase()) >= 0) matched = HEADER_MAP[key];
        });
      }
      if (matched) { colMap[h] = matched; hasHeaderMatch = true; }
    }

    // If no header matches, assume fixed column order
    if (!hasHeaderMatch) {
      var defaultOrder = ["name","furigana","postalCode","address","district","phone","email","rank","visitStatus","introducer","memo","lat","lng"];
      for (var di = 0; di < Math.min(headerCols.length, defaultOrder.length); di++) {
        colMap[di] = defaultOrder[di];
      }
      // First row might be data, not header
      var firstVal = headerCols[0].trim();
      if (firstVal && firstVal !== "名前" && firstVal !== "氏名" && firstVal.length > 0 && firstVal.length < 30) {
        lines.unshift(""); // dummy header so loop starts from index 1 which is original line 0
      }
    }

    var newMembers = [];
    var skipped = 0;

    for (var i = 1; i < lines.length; i++) {
      var cols = parseLine(lines[i], delimiter);
      var row = {};
      Object.keys(colMap).forEach(function(idx) {
        row[colMap[idx]] = (cols[parseInt(idx)] || "").trim();
      });

      // Skip if no name
      if (!row.name) { skipped++; continue; }

      // Normalize rank
      var rank = (row.rank || "").toUpperCase();
      if (["A","B","C","D"].indexOf(rank) < 0) rank = "C";

      // Normalize visitStatus
      var vs = row.visitStatus || "unvisited";
      if (!VISIT_STATUS[vs]) vs = "unvisited";

      newMembers.push({
        id: generateId(),
        name: row.name || "",
        furigana: row.furigana || "",
        postalCode: row.postalCode || "",
        address: row.address || "",
        district: row.district || "",
        phone: row.phone || "",
        email: row.email || "",
        rank: rank,
        visitStatus: vs,
        introducer: row.introducer || "",
        memo: row.memo || "",
        lat: row.lat || "",
        lng: row.lng || "",
        contacts: [],
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      });
    }

    setMembers(function(prev) { return prev.concat(newMembers); });
    var delimName = delimiter === "\t" ? "タブ区切り" : delimiter === ";" ? "セミコロン区切り" : "カンマ区切り";
    var mappedFields = Object.values(colMap).join("・");
    var msg = newMembers.length + "件をインポートしました（" + delimName + "）";
    if (skipped > 0) msg += "（" + skipped + "行は名前が空のためスキップ）";
    showToast(msg);

    // Auto-geocode members without coordinates
    var needGeocode = newMembers.filter(function(m) { return m.address && (!m.lat || !m.lng); });
    if (needGeocode.length > 0) {
      setTimeout(function() { batchGeocode(needGeocode.map(function(m) { return m.id; })); }, 500);
    }
  }

  async function batchGeocode(ids) {
    if (!(window.google && window.google.maps)) {
      showToast("Google Maps が読み込まれていないため座標取得できません");
      return;
    }
    var geocoder = new window.google.maps.Geocoder();
    var total = ids.length;
    var done = 0;
    var success = 0;
    setGeocodeProgress({ done: 0, total: total, success: 0 });

    for (var i = 0; i < ids.length; i++) {
      var targetId = ids[i];
      // Get current address from members state
      var currentMembers = null;
      await new Promise(function(resolve) {
        setMembers(function(prev) { currentMembers = prev; return prev; });
        setTimeout(resolve, 10);
      });
      var member = currentMembers.find(function(m) { return m.id === targetId; });
      if (!member || !member.address || (member.lat && member.lng)) { done++; setGeocodeProgress({ done: done, total: total, success: success }); continue; }

      try {
        var result = await new Promise(function(resolve, reject) {
          geocoder.geocode({ address: member.address }, function(results, status) {
            if (status === "OK" && results[0]) resolve(results[0]);
            else reject(status);
          });
        });
        var lat = result.geometry.location.lat().toFixed(6);
        var lng = result.geometry.location.lng().toFixed(6);
        setMembers(function(prev) { return prev.map(function(m) {
          return m.id === targetId ? Object.assign({}, m, { lat: lat, lng: lng }) : m;
        }); });
        success++;
      } catch(e) {
        // Geocoding failed for this address - skip
      }
      done++;
      setGeocodeProgress({ done: done, total: total, success: success });

      // Rate limit: wait 200ms between requests to avoid OVER_QUERY_LIMIT
      if (i < ids.length - 1) {
        await new Promise(function(resolve) { setTimeout(resolve, 200); });
      }
    }

    setGeocodeProgress(null);
    showToast("座標取得完了: " + success + "/" + total + "件成功");
  }

  function importCSV(e) {
    var file = e.target.files[0]; if (!file) return;

    // Try UTF-8 first, then Shift-JIS if garbled
    var reader = new FileReader();
    reader.onload = function(ev) {
      var text = ev.target.result;
      // Check for garbled text (common when Shift-JIS is read as UTF-8)
      if (text.indexOf("\uFFFD") >= 0 || (text.indexOf("名") < 0 && text.indexOf("name") < 0 && text.indexOf(",") >= 0 && /[\x80-\xff]/.test(text))) {
        // Retry with Shift-JIS
        var reader2 = new FileReader();
        reader2.onload = function(ev2) { processCSVText(ev2.target.result); };
        reader2.readAsText(file, "Shift_JIS");
      } else {
        processCSVText(text);
      }
    };
    reader.readAsText(file, "UTF-8");
    e.target.value = "";
  }

  async function calculateRoute() {
    if (routeSelectedIds.size < 1) { showToast("訪問先を1件以上選択してください"); return; }
    if (routeSelectedIds.size > 25) { showToast("Google Maps の制限により25件以下にしてください"); return; }
    if (!(window.google && window.google.maps)) { showToast("Google Maps が読み込まれていません"); return; }

    setRouteCalculating(true);
    setRouteResult(null);

    var selectedMembers = members.filter(function(m) { return routeSelectedIds.has(m.id) && m.lat && m.lng; });

    try {
      // Geocode origin
      var originCoords = null;
      var geocoder = new window.google.maps.Geocoder();
      try {
        var gResult = await new Promise(function(resolve, reject) {
          geocoder.geocode({ address: routeOrigin }, function(results, status) {
            if (status === "OK" && results[0]) resolve(results[0]); else reject(status);
          });
        });
        originCoords = { lat: gResult.geometry.location.lat(), lng: gResult.geometry.location.lng() };
      } catch(e) {
        showToast("出発地点の住所が見つかりません");
        setRouteCalculating(false);
        return;
      }

      var directionsService = new window.google.maps.DirectionsService();
      var waypoints = selectedMembers.map(function(m) {
        return { location: new window.google.maps.LatLng(parseFloat(m.lat), parseFloat(m.lng)), stopover: true };
      });

      var request = {
        origin: new window.google.maps.LatLng(originCoords.lat, originCoords.lng),
        destination: new window.google.maps.LatLng(originCoords.lat, originCoords.lng), // Return to origin
        waypoints: waypoints,
        optimizeWaypoints: true,
        travelMode: window.google.maps.TravelMode.DRIVING,
      };

      var result = await new Promise(function(resolve, reject) {
        directionsService.route(request, function(res, status) {
          if (status === "OK") resolve(res); else reject(status);
        });
      });

      var route = result.routes[0];
      var order = route.waypoint_order;
      var orderedMembers = order.map(function(i) { return selectedMembers[i]; });
      var totalDist = 0, totalTime = 0;
      var legs = route.legs.map(function(leg, idx) {
        totalDist += leg.distance.value;
        totalTime += leg.duration.value;
        return {
          from: idx === 0 ? "出発地点" : orderedMembers[idx - 1].name,
          to: idx === route.legs.length - 1 ? "出発地点（帰着）" : orderedMembers[idx].name,
          distance: leg.distance.text,
          duration: leg.duration.text,
        };
      });

      setRouteResult({
        directionsResult: result,
        orderedMembers: orderedMembers,
        legs: legs,
        totalDist: (totalDist / 1000).toFixed(1) + "km",
        totalTime: Math.round(totalTime / 60) + "分",
        originCoords: originCoords,
      });
      showToast("ルートを計算しました");
    } catch(e) {
      var errMsg = String(e);
      if (errMsg.indexOf("REQUEST_DENIED") >= 0) {
        showToast("Directions APIが有効になっていません。Google Cloud Consoleで有効化してください。");
      } else if (errMsg.indexOf("ZERO_RESULTS") >= 0) {
        showToast("経路が見つかりませんでした。住所を確認してください。");
      } else if (errMsg.indexOf("MAX_WAYPOINTS_EXCEEDED") >= 0) {
        showToast("経由地が多すぎます。25件以下にしてください。");
      } else if (errMsg.indexOf("OVER_QUERY_LIMIT") >= 0) {
        showToast("API利用制限に達しました。しばらく待ってから再試行してください。");
      } else {
        showToast("ルート計算に失敗しました: " + errMsg);
      }
    }
    setRouteCalculating(false);
  }

      if (!mapInstanceRef.current) {
        mapInstanceRef.current = new window.google.maps.Map(mapRef.current, {

          mapTypeControl: true, streetViewControl: false,
        });

      if (rendererRef.current) { rendererRef.current.setMap(null); }
      rendererRef.current = new window.google.maps.DirectionsRenderer({

        directions: routeResult.directionsResult,
        suppressMarkers: false,
        polylineOptions: { strokeColor: "#2563eb", strokeWeight: 4, strokeOpacity: 0.8 },

  async function geocodeAddress(address) {
    if (!address || !(window.google && window.google.maps)) return null;
    try {
      var geocoder = new window.google.maps.Geocoder();
      var result = await new Promise(function(resolve, reject) {
        geocoder.geocode({ address: address }, function(results, status) {
          if (status === "OK" && results[0]) resolve(results[0]); else reject(status);
        });
      });
      return { lat: result.geometry.location.lat().toFixed(6), lng: result.geometry.location.lng().toFixed(6) };
    } catch(e) { return null; }
  }

                        <td style={S.td}><span style={S.visitBadge(vs)}>{(VISIT_STATUS[vs]||{}).icon} {(VISIT_STATUS[vs]||{}).label}</span></td>

                  <label style={S.label}>住所</label>
                  <div style={{display:"flex",gap:8}}>
                    <input style={Object.assign({},S.input,{flex:1})} value={form.address} onChange={function(e){setForm(Object.assign({},form,{address:e.target.value}));}} placeholder="栃木県佐野市○○町1-2-3" />
                    <button style={S.btn("ghost")} onClick={handleGeocodeForm}>{"\u{1F4CD}"}取得</button>
                  </div>
                </div>
                <div><label style={S.label}>電話番号</label><input style={S.input} value={form.phone} onChange={function(e){setForm(Object.assign({},form,{phone:e.target.value}));}} placeholder="0283-00-0000" /></div>
                <div><label style={S.label}>メールアドレス</label><input style={S.input} value={form.email} onChange={function(e){setForm(Object.assign({},form,{email:e.target.value}));}} placeholder="taro@example.com" /></div>

                <div><label style={S.label}>訪問進捗</label><select style={Object.assign({},S.select,{width:"100%"})} value={form.visitStatus||"unvisited"} onChange={function(e){setForm(Object.assign({},form,{visitStatus:e.target.value}));}}>{Object.entries(VISIT_STATUS).map(function(e){return <option key={e[0]} value={e[0]}>{e[1].icon} {e[1].label}</option>;})}</select></div>
                <div><label style={S.label}>緯度 / 経度</label><div style={{display:"flex",gap:8}}><input style={S.input} value={form.lat} onChange={function(e){setForm(Object.assign({},form,{lat:e.target.value}));}} placeholder="36.3142" /><input style={S.input} value={form.lng} onChange={function(e){setForm(Object.assign({},form,{lng:e.target.value}));}} placeholder="139.5787" /></div></div>
                <div style={{gridColumn:isMobile?"1":"1/3"}}><label style={S.label}>メモ</label><textarea style={Object.assign({},S.input,{minHeight:70,resize:"vertical"})} value={form.memo} onChange={function(e){setForm(Object.assign({},form,{memo:e.target.value}));}} placeholder="自由メモ欄" /></div>

                <button style={S.btn("primary")} onClick={saveMember}>{view==="edit"?"更新する":"登録する"}</button>

                {view==="edit" && <button style={S.btn("danger")} onClick={function(){setConfirmDelete({id:form.id,name:form.name});}}>削除</button>}
              </div>
            </div>

                <div><label style={S.label}>担当者</label><input style={S.input} value={contactForm.staff} onChange={function(e){setContactForm(Object.assign({},contactForm,{staff:e.target.value}));}} placeholder="担当者名" /></div>

                <div style={{display:"flex",flexDirection:"column",gap:8}}>

                      <span style={{padding:"2px 10px",borderRadius:12,fontSize:11,fontWeight:600,background:"#e8e6e1"}}>{c.type}</span>
                      {c.staff && <span style={{fontSize:12,color:theme.textSub}}>{c.staff}</span>}
                      <div style={{flex:1,fontSize:13}}>{c.content}</div>
                      <button style={{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:16}} onClick={function(){deleteContact(selected.id,c.id);}}>{"\u00D7"}</button>
                    </div>
                  ); })}
                </div>
              )}
            </div>
          </>)}

          {/* MAP */}
          {view === "map" && (
            <div style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>

                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <select value={filterMapRank} onChange={function(e){setFilterMapRank(e.target.value);}} style={Object.assign({},S.select,{fontSize:12,padding:"4px 8px"})}>
                    <option value="all">全ランク</option>
                    {Object.entries(RANKS).map(function(e){return <option key={e[0]} value={e[0]}>{e[1].label}</option>;})}
                  </select>
                  <select value={filterMapVisit} onChange={function(e){setFilterMapVisit(e.target.value);}} style={Object.assign({},S.select,{fontSize:12,padding:"4px 8px"})}>
                    <option value="all">全訪問状況</option>
                    {Object.entries(VISIT_STATUS).map(function(e){return <option key={e[0]} value={e[0]}>{e[1].icon} {e[1].label}</option>;})}
                  </select>
                </div>
              </div>

              {/* Legend */}
              <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:8,padding:"8px 12px",background:"#f9f8f6",borderRadius:8,fontSize:11}}>
                <div>
                  <div style={{fontWeight:700,marginBottom:4,color:theme.textSub}}>外円 = ランク</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {Object.entries(RANKS).map(function(e){return(
                      <span key={e[0]} style={{display:"flex",alignItems:"center",gap:3}}>
                        <span style={{width:12,height:12,borderRadius:"50%",background:e[1].color,display:"inline-block"}} />
                        {e[1].label.split("\uFF1A")[1]}
                      </span>
                    );})}
                  </div>
                </div>
                <div>
                  <div style={{fontWeight:700,marginBottom:4,color:theme.textSub}}>内円 = 訪問進捗</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {Object.entries(VISIT_STATUS).map(function(e){return(
                      <span key={e[0]} style={{display:"flex",alignItems:"center",gap:3}}>
                        <span style={{width:10,height:10,borderRadius:"50%",background:e[1].color,display:"inline-block"}} />
                        {e[1].icon} {e[1].label}
                      </span>
                    );})}
                  </div>
                </div>
              </div>

              <div style={{fontSize:12,color:theme.textSub,marginBottom:6}}>
                座標登録済み: {members.filter(function(m){return m.lat&&m.lng;}).length} / {members.length}名

              </div>
              <div style={{height:isMobile?400:550,borderRadius:8,overflow:"hidden"}}>
                <MapView members={members} onSelectMember={function(id){setSelectedId(id);setView("detail");}} mapMode={mapMode} filterMapRank={filterMapRank} filterMapVisit={filterMapVisit} />
              </div>
            </div>
          )}

          {view === "route" && (
            <>
              <div style={S.card}>

                <div style={{marginBottom:12}}>
                  <label style={S.label}>出発地点</label>
                  <input style={Object.assign({},S.input,{maxWidth:400})} value={routeOrigin} onChange={function(e){setRouteOrigin(e.target.value);}} placeholder="栃木県佐野市大橋町1164-3" />
                </div>

                {/* Route filters */}
                <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:12}}>

                  <select value={routeFilterRank} onChange={function(e){setRouteFilterRank(e.target.value);}} style={Object.assign({},S.select,{fontSize:12})}>
                    <option value="all">全ランク</option>
                    {Object.entries(RANKS).map(function(e){return <option key={e[0]} value={e[0]}>{e[1].label}</option>;})}
                  </select>
                  <select value={routeFilterVisit} onChange={function(e){setRouteFilterVisit(e.target.value);}} style={Object.assign({},S.select,{fontSize:12})}>
                    <option value="all">全訪問状況</option>
                    {Object.entries(VISIT_STATUS).map(function(e){return <option key={e[0]} value={e[0]}>{e[1].icon} {e[1].label}</option>;})}
                  </select>
                  <select value={routeFilterDistrict} onChange={function(e){setRouteFilterDistrict(e.target.value);}} style={Object.assign({},S.select,{fontSize:12})}>
                    <option value="all">全地区</option>

                  {routeSelectedIds.size > 25 && <span style={{color:"#dc2626",fontWeight:700}}> ※25件以下にしてください</span>}
                </div>
                <div style={{maxHeight:250,overflowY:"auto",border:"1px solid "+theme.border,borderRadius:8,marginBottom:12}}>
                  <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:12}}>
                    <thead><tr>
                      <th style={Object.assign({},S.th,{width:36,position:"sticky",top:0,background:theme.card})} onClick={selectAllRouteCandidates}>
                        <input type="checkbox" checked={routeCandidates.length>0&&routeCandidates.every(function(m){return routeSelectedIds.has(m.id);})} onChange={selectAllRouteCandidates} style={{cursor:"pointer"}} />
                      </th>
                      <th style={Object.assign({},S.th,{position:"sticky",top:0,background:theme.card})}>ランク</th>
                      <th style={Object.assign({},S.th,{position:"sticky",top:0,background:theme.card})}>名前</th>
                      <th style={Object.assign({},S.th,{position:"sticky",top:0,background:theme.card})}>地区</th>
                      <th style={Object.assign({},S.th,{position:"sticky",top:0,background:theme.card})}>進捗</th>
                    </tr></thead>
                    <tbody>
                      {routeCandidates.map(function(m) {
                        var vs = computeVisitStatus(m);
                        var checked = routeSelectedIds.has(m.id);
                        return (
                          <tr key={m.id} style={{cursor:"pointer",background:checked?"#eff6ff":"transparent"}} onClick={function(){toggleRouteSelect(m.id);}}>
                            <td style={S.td} onClick={function(e){e.stopPropagation();}}>
                              <input type="checkbox" checked={checked} onChange={function(){toggleRouteSelect(m.id);}} style={{cursor:"pointer"}} />
                            </td>
                            <td style={S.td}><span style={S.badge(m.rank)}>{m.rank}</span></td>
                            <td style={Object.assign({},S.td,{fontWeight:600})}>{m.name}</td>
                            <td style={S.td}>{m.district}</td>
                            <td style={S.td}><span style={S.visitBadge(vs)}>{(VISIT_STATUS[vs]||{}).icon}</span></td>
                          </tr>
                        );
                      })}
                      {routeCandidates.length === 0 && <tr><td colSpan={5} style={Object.assign({},S.td,{textAlign:"center",padding:20,color:theme.textSub})}>座標が登録済みの対象会員がいません</td></tr>}
                    </tbody>
                  </table>
                </div>

                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <button style={S.btn("primary")} onClick={calculateRoute} disabled={routeCalculating || routeSelectedIds.size===0}>

                  </button>

                  )}
                </div>
              </div>

              {/* Route result */}
              {routeResult && (
                <>
                  <div style={S.card}>

                      <div style={{display:"flex",gap:16,fontSize:13}}>
                        <span><b>総距離:</b> {routeResult.totalDist}</span>

                    <div style={{height:isMobile?350:500,borderRadius:8,overflow:"hidden",marginBottom:12}}>
                      <RouteMapView routeResult={routeResult} />
                    </div>
                    <button style={Object.assign({},S.btn("primary"),{fontSize:15,padding:"12px 28px"})} onClick={openGoogleMapsNav}>
                      {"\u{1F4F1}"} Google Mapsでナビを開始
                    </button>
                  </div>

                  <div style={S.card}>
                    <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>巡回順序</div>
                    <div style={{display:"flex",flexDirection:"column",gap:0}}>
                      {/* Origin */}
                      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0"}}>
                        <div style={{width:28,height:28,borderRadius:"50%",background:"#1a365d",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>S</div>
                        <div><div style={{fontWeight:700}}>出発地点</div><div style={{fontSize:11,color:theme.textSub}}>{routeOrigin}</div></div>
                      </div>

                            <div style={{display:"flex",alignItems:"center",gap:8,padding:"2px 0 2px 13px",color:theme.textSub,fontSize:11}}>
                              <div style={{width:2,height:20,background:theme.border}} />

                            <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",cursor:"pointer"}} onClick={function(){setSelectedId(m.id);setView("detail");}}>
                              <div style={{width:28,height:28,borderRadius:"50%",background:(RANKS[m.rank]||RANKS.C).color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>{idx+1}</div>
                              <div style={{flex:1}}>
                                <div style={{fontWeight:700}}>{m.name} <span style={S.visitBadge(vs)}>{(VISIT_STATUS[vs]||{}).icon}</span></div>
                                <div style={{fontSize:11,color:theme.textSub}}>{m.address}{m.introducer ? " ／紹介者: "+m.introducer : ""}</div>
                              </div>
                            </div>
                          </div>

                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"2px 0 2px 13px",color:theme.textSub,fontSize:11}}>

                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0"}}>
                        <div style={{width:28,height:28,borderRadius:"50%",background:"#1a365d",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>G</div>
                        <div><div style={{fontWeight:700}}>帰着（出発地点）</div></div>
                      </div>
                    </div>
                  </div>
                </>
              )}
            </>
          )}

          {/* CHART */}
          {view === "chart" && (<>
            <div style={S.card}>
              <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>ランク別構成</div>
              <div style={{display:"flex",gap:6,alignItems:"flex-end",height:160}}>
                {Object.entries(RANKS).map(function(e){var k=e[0],v=e[1],c=chartData.byRank[k]||0,mx=Math.max.apply(null,Object.values(chartData.byRank).concat([1])),h=(c/mx)*140;
                  return <div key={k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{fontSize:14,fontWeight:800,color:v.color}}>{c}</div>
                    <div style={{width:"70%",height:h,background:v.color,borderRadius:"6px 6px 0 0",transition:"height 0.3s"}} />
                    <div style={{fontSize:11,fontWeight:600,color:v.color}}>{k}</div>
                  </div>;
                })}
              </div>
            </div>
            <div style={S.card}>
              <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>訪問進捗状況</div>
              <div style={{display:"flex",gap:6,alignItems:"flex-end",height:160}}>
                {Object.entries(VISIT_STATUS).map(function(e){var k=e[0],v=e[1],c=chartData.byVisit[k]||0,mx=Math.max.apply(null,Object.values(chartData.byVisit).concat([1])),h=(c/mx)*140;
                  return <div key={k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{fontSize:14,fontWeight:800,color:v.color}}>{c}</div>
                    <div style={{width:"70%",height:h,background:v.color,borderRadius:"6px 6px 0 0",transition:"height 0.3s"}} />
                    <div style={{fontSize:10,fontWeight:600,color:v.color,textAlign:"center"}}>{v.icon}<br/>{v.label}</div>
                  </div>;
                })}
              </div>
            </div>
            <div style={S.card}>
              <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>地区別分布</div>
              {Object.keys(chartData.byDistrict).length===0 ? <div style={{color:theme.textSub,textAlign:"center",padding:20}}>地区が未設定です</div> : (
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {Object.entries(chartData.byDistrict).sort(function(a,b){return b[1].total-a[1].total;}).map(function(e){
                    var d=e[0],data=e[1],mx=Math.max.apply(null,Object.values(chartData.byDistrict).map(function(x){return x.total;}).concat([1]));
                    return <div key={d}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                        <span style={{fontWeight:600}}>{d}</span><span style={{color:theme.textSub}}>{data.total}名</span>
                      </div>
                      <div style={{display:"flex",height:22,borderRadius:4,overflow:"hidden",background:"#f1f0ed"}}>
                        {Object.entries(RANKS).map(function(re){var k=re[0],v=re[1],w=(data[k]/mx)*100;return w>0?<div key={k} style={{width:w+"%",background:v.color}} title={v.label+": "+data[k]+"名"} />:null;})}
                      </div>
                    </div>;
                  })}
                </div>
              )}
            </div>
            <div style={S.card}>
              <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>接触活動サマリー</div>
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:12}}>
                {(function(){
                  var allC=members.reduce(function(a,m){return a.concat(m.contacts||[]);},[]);
                  var now=new Date();var thisM=allC.filter(function(c){var d=new Date(c.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
                  var byT={};allC.forEach(function(c){byT[c.type]=(byT[c.type]||0)+1;});var topE=Object.entries(byT).sort(function(a,b){return b[1]-a[1];});var topT=topE[0];
                  return[{label:"総接触回数",val:allC.length},{label:"今月の接触",val:thisM.length},{label:"接触済み会員",val:members.filter(function(m){return(m.contacts||[]).length>0;}).length},{label:"最多手段",val:topT?topT[0]+"("+topT[1]+")":"\u2014"}].map(function(s){return <div key={s.label} style={{padding:"14px 16px",background:"#f7f6f3",borderRadius:8,textAlign:"center"}}><div style={{fontSize:11,color:theme.textSub,fontWeight:600,marginBottom:4}}>{s.label}</div><div style={{fontSize:22,fontWeight:800}}>{s.val}</div></div>;});
                })()}
              </div>
            </div>
          </>)}

          {/* CONTACTS */}
          {view === "contacts" && (
            <div style={S.card}>
              <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>最近の接触履歴</div>
              {(function(){
                var all=members.reduce(function(a,m){return a.concat((m.contacts||[]).map(function(c){return Object.assign({},c,{memberName:m.name,memberId:m.id,rank:m.rank});}));},[]);
                all.sort(function(a,b){return(b.date||"").localeCompare(a.date||"");});
                if(all.length===0)return <div style={{color:theme.textSub,textAlign:"center",padding:30}}>接触記録はまだありません</div>;
                return all.slice(0,100).map(function(c){return(
                  <div key={c.id} style={{display:"flex",gap:12,padding:"10px 14px",borderBottom:"1px solid "+theme.border,alignItems:"center",cursor:"pointer",flexWrap:"wrap"}}
                    onClick={function(){setSelectedId(c.memberId);setView("detail");}}>
                    <span style={S.badge(c.rank)}>{c.rank}</span>
                    <span style={{fontWeight:600,minWidth:80}}>{c.memberName}</span>
                    <span style={{fontSize:12,color:theme.textSub,minWidth:80}}>{formatDate(c.date)}</span>
                    <span style={{padding:"2px 10px",borderRadius:12,fontSize:11,fontWeight:600,background:"#e8e6e1"}}>{c.type}</span>
                    {c.staff&&<span style={{fontSize:12,color:theme.textSub}}>{c.staff}</span>}
                    <span style={{flex:1,fontSize:13}}>{c.content}</span>
                  </div>
                );});
              })()}
            </div>
          )}

        </div>
      </div>

      {toast && <div className="toast-anim" style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:theme.primary,color:"#fff",padding:"10px 24px",borderRadius:8,fontSize:14,fontWeight:500,zIndex:200,boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
